<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pending Approval | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container center-page">
    <section class="card auth-card">
      <h1>Pending Approval</h1>
      <p class="lead">
        Your account exists, but an admin still needs to approve you before you can access the hub.
      </p>

      <div class="button-row">
        <button id="logout-btn" class="btn btn-secondary">Log Out</button>
        <a href="index.html" class="btn btn-primary">Home</a>
      </div>
    </section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
<script>
  document.getElementById("logout-btn").addEventListener("click", async () => {
    await window.supabaseClient.auth.signOut();
    window.location.href = "index.html";
  });

  requireAuth(true);
</script>
</body>
</html>
