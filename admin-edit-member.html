<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Member | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <h2 class="site-title">Cruise Cunts Hub</h2>
        <p class="small-text">Administrator member editor</p>
      </div>
      <div class="button-row">
        <a class="btn btn-secondary" href="members.html">Back to Members</a>
        <button id="logout-btn" class="btn btn-primary">Log Out</button>
      </div>
    </div>
  </header>

  <main class="container page-space">
    <section class="card" style="max-width: 760px; margin: 0 auto;">
      <h1>Edit Member</h1>
      <p class="lead">Admins can update member details here.</p>

      <form id="admin-member-form" class="profile-form">
        <label>Display Name</label>
        <input type="text" id="display_name" />

        <label>Cruise Status</label>
        <select id="cruise_status">
          <option value="interested">Interested</option>
          <option value="booked">Booked</option>
          <option value="maybe">Maybe</option>
          <option value="not this one">Not This One</option>
        </select>

        <label>Room Number</label>
        <input type="text" id="room_number" />

        <label>Favorite Ship</label>
        <input type="text" id="favorite_ship" />

        <label>Hometown</label>
        <input type="text" id="hometown" />

        <label>Instagram</label>
        <input type="text" id="instagram" />

        <label>Ships You’ve Been On</label>
        <input type="text" id="ships_sailed" />

        <label>Bio</label>
        <textarea id="bio" rows="4"></textarea>

        <label>Approved</label>
        <select id="approved">
          <option value="true">Yes</option>
          <option value="false">No</option>
        </select>

        <label>Role</label>
        <select id="role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>

        <div class="button-row" style="margin-top: 1rem;">
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>

        <p id="admin-member-message" class="small-text" style="margin-top: 1rem;"></p>
      </form>
    </section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-edit-member.js"></script>
</body>
</html>
