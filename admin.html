<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <h2 class="site-title">Admin Overview</h2>
        <p class="small-text">Approve and manage members</p>
      </div>
      <div class="button-row">
        <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
        <button id="logout-btn" class="btn btn-primary">Log Out</button>
      </div>
    </div>
  </header>

  <main class="container page-space">
    <section class="card">
      <h1>Member Approvals</h1>
      <p class="lead">Approve pending accounts and manage roles.</p>
      <p id="admin-message" class="message"></p>
    </section>

    <section class="card">
      <div id="user-list" class="user-list"></div>
    </section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
