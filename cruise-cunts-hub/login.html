<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container center-page">
    <section class="card auth-card">
      <h1>Log In</h1>
      <p class="subtext">Use your approved member account.</p>

      <form id="login-form" class="form">
        <label>
          Email
          <input type="email" id="email" required />
        </label>

        <label>
          Password
          <input type="password" id="password" required />
        </label>

        <button type="submit" class="btn btn-primary full-width">Log In</button>
      </form>

      <p id="message" class="message"></p>

      <div class="auth-links">
        <a href="signup.html">Need access?</a>
        <a href="index.html">Back home</a>
      </div>
    </section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
