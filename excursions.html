<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excursions | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <h2 class="site-title">Cruise Cunts Hub</h2>
        <p class="small-text">Excursion planner</p>
      </div>
      <div class="button-row">
        <a href="photos.html" class="btn btn-secondary">Photos</a>
        <a class="btn btn-secondary" href="dashboard.html">Dashboard</a>
        <button id="logout-btn" class="btn btn-primary">Log Out</button>
      </div>
    </div>
  </header>

  <main class="container page-space">
    <section class="card">
      <h1>Excursions</h1>
      <p class="lead">
        Browse excursions by port, mark what you booked, add your time, and see what the rest of the group is doing.
      </p>
      <p id="excursions-message" class="small-text"></p>
    </section>

    <section id="excursions-wrap" class="page-space"></section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/excursions.js"></script>
</body>
</html>
