<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | Cruise Cunts Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div>
        <h2 class="site-title">Cruise Cunts Hub</h2>
        <p class="small-text">Customize your member profile</p>
      </div>
      <div class="button-row">
        <a class="btn btn-secondary" href="dashboard.html">Dashboard</a>
        <a class="btn btn-secondary" href="members.html">Members</a>
        <button id="logout-btn" class="btn btn-primary">Log Out</button>
      </div>
    </div>
  </header>

  <main class="container page-space">
    <section class="card" style="max-width: 760px; margin: 0 auto;">
      <h1>My Profile</h1>
      <p class="lead">Make it cute. Make it useful. Make people jealous of your cruise history.</p>

      <form id="profile-form" class="profile-form">
        <label>Display Name</label>
        <input type="text" id="display_name" />

        <label>Profile Picture URL</label>
        <input type="text" id="avatar_url" placeholder="https://..." />

        <label>Cruise Status</label>
        <select id="cruise_status">
          <option value="interested">Interested</option>
          <option value="booked">Booked</option>
          <option value="maybe">Maybe</option>
          <option value="not this one">Not This One</option>
        </select>

        <label>Room Number</label>
        <input type="text" id="room_number" />

        <label>Favorite Ship</label>
        <input type="text" id="favorite_ship" />

        <label>Hometown</label>
        <input type="text" id="hometown" />

        <label>Instagram</label>
        <input type="text" id="instagram" />

        <label>Ships You’ve Been On</label>
        <input type="text" id="ships_sailed" placeholder="Norwegian Jewel, Carnival Vista, Mardi Gras" />

        <label>Bio / Cruise Fun Fact</label>
        <textarea id="bio" rows="4" placeholder="Met half my friends at sailaway and never recovered."></textarea>

        <div class="button-row" style="margin-top: 1rem;">
          <button type="submit" class="btn btn-primary">Save Profile</button>
        </div>

        <p id="profile-message" class="small-text" style="margin-top: 1rem;"></p>
      </form>
    </section>
  </main>

  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
